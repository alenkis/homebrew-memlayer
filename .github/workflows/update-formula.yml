name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      sha256:
        description: "SHA256 of the release tarball"
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Render formula from template
        run: |
          sed -e 's/{{version}}/${{ inputs.version }}/g' \
              -e 's/{{sha256}}/${{ inputs.sha256 }}/g' \
              memlayer.rb.tmpl > memlayer.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memlayer.rb
          git commit -m "Update memlayer to ${{ inputs.version }}"
          git push
